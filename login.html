<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            background-image: url(image2.jpg);
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-form {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 350px;
            max-width: 100%;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }

        .form-group button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-group button:hover {
            background-color: #0056b3;
        }

        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
        }

        .form-footer a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-form">         
        <h2>Login to Your Account</h2>
        <form action="https://formsubmit.co/himanshusharma9663@gmail.com" method="POST" id="loginForm">
            <!-- Email or Username -->
            <div class="form-group">
                <label for="email">Email or Username</label>
                <input type="text" id="email" name="email" placeholder="Enter your email or username" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <!-- Submit Button -->
            <div class="form-group">
                <a href="new.html">
                <button type="submit">login</button>
            </a>
            </div>
        </form>

        <div class="form-footer">
            <p>Don't have an account? <a href="Registration.html">Sign up here</a></p>
            <p><a href="#">Forgot Password?</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function redirectTologin(event) {
               event.preventDefault();
               window.location.href="new.html";
            let isValid = true;

            // Clear previous error messages
            document.getElementById('emailError').innerText = '';
            document.getElementById('passwordError').innerText = '';

            // Validate email or username
            const email = document.getElementById('email').value.trim();
            if (!email) {
                document.getElementById('emailError').innerText = 'Email or Username is required.';
                isValid = false;
            }

            // Validate password
            const password = document.getElementById('password').value.trim();
            if (!password) {
                document.getElementById('passwordError').innerText = 'Password is required.';
                isValid = false;
            }

            // Prevent form submission if validation fails
            if (!isValid) {
                event.preventDefault();
            }
        });
    </script>

</body>
</html>
